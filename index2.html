<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --sand:#faf4e6;
    --sand-deep:#f1e7d1;
    --teal:#0e5c63;
    --teal-deep:#0a3d42;
    --ink:#132a2e;
    --gold:#dfba6b;       
    --gold-soft:#f2e3be;  
    --coral:#d97a52;
    --line:rgba(19,42,46,0.12);
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; width:100%; overflow-x:hidden;}
  body{
    background:var(--sand);
    color:var(--ink);
    font-family:'Jost',sans-serif;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Dynamic Slideshow Background ---------- */
  .bg-slideshow {
    position: fixed;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    overflow: hidden;
    background: var(--sand);
  }
  .bg-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  .bg-slide.active {
    opacity: 0.18; /* Elegant, subtle opacity to ensure menu legibility */
  }

  /* Soft ambient lighting overlay */
  .wash{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(ellipse 900px 500px at 8% -5%, rgba(14,92,99,0.08), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(195,154,92,0.12), transparent 55%),
      radial-gradient(ellipse 800px 600px at 90% 100%, rgba(14,92,99,0.06), transparent 60%);
  }

  /* ---------- Header ---------- */
  header{
    max-width: 960px;
    margin: 0 auto;
    padding:30px 16px 15px;
    text-align:center;
    position:relative;
  }
  
  .brand-logo-wrap {
    position: absolute;
    left: 16px;
    top: 30px;
    width: 65px; 
    display: block;
    z-index: 10;
  }
  .brand-logo {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0px 2px 5px rgba(14,92,99,0.06));
  }

  .brand-eyebrow{
    font-family:'Cormorant SC', serif;
    letter-spacing:0.25em;
    font-size:12px;
    color:var(--teal);
    font-weight:600;
    padding-top: 5px; 
  }
  h1.brand{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:clamp(36px, 9vw, 64px);
    margin:2px 0 0;
    color:var(--teal-deep);
    letter-spacing:0.01em;
  }
  h1.brand em{ font-style:italic; color:var(--gold); font-weight:500; }
  .brand-sub{
    font-family:'Cormorant SC', serif;
    font-size:13px;
    letter-spacing:0.3em;
    color:var(--ink);
    opacity:0.55;
    margin-top:4px;
    line-height:1.4;
  }

  .wave{
    display:block; width:100%; height:24px; margin-top:16px;
  }

  /* ---------- Search ---------- */
  .search-wrap{
    max-width:520px; margin:15px auto 0; padding:0 16px;
  }
  .search-box{
    position:relative;
  }
  .search-box input{
    width:100%;
    padding:12px 44px 12px 18px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255, 255, 255, 0.9);
    font-family:'Jost',sans-serif;
    font-size:16px; 
    color:var(--ink);
    outline:none;
    transition:border-color .2s, box-shadow .2s, background .2s;
    -webkit-appearance: none;
    backdrop-filter: blur(4px);
  }
  .search-box input:focus{
    border-color:var(--gold);
    background: #ffffff;
    box-shadow:0 0 0 3px rgba(223,186,107,0.18);
  }
  .search-box svg{
    position:absolute; right:16px; top:50%; transform:translateY(-50%);
    width:17px; height:17px; opacity:0.45;
  }

  /* ---------- Tabs ---------- */
  nav.tabs{
    position:sticky; top:0; z-index:20;
    background:rgba(250,244,230,0.92);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    margin-top:20px;
  }
  .tabs-inner{
    max-width:960px; margin:0 auto;
    display:flex; 
    justify-content:flex-start; 
    gap:4px;
    overflow-x:auto;
    padding:0 8px;
    scrollbar-width:none; 
    -webkit-overflow-scrolling:touch; 
  }
  .tabs-inner::-webkit-scrollbar{display:none;} 
  
  .tab-btn{
    background:none; border:none; cursor:pointer;
    font-family:'Cormorant SC', serif;
    font-size:15px;
    letter-spacing:0.1em;
    color:var(--ink);
    opacity:0.55;
    padding:14px 14px 11px;
    white-space:nowrap;
    position:relative;
    transition:opacity .2s, color .2s;
  }
  .tab-btn.active{ opacity:1; color:var(--teal-deep); font-weight:600; }
  .tab-btn.active::after{
    content:"";
    position:absolute; left:14px; right:14px; bottom:0; height:3px;
    background:var(--gold);
    border-radius:2px;
  }

  /* Subsection pills */
  .pillbar{
    max-width:960px; margin:0 auto;
    display:flex; gap:6px; 
    overflow-x:auto; 
    justify-content:flex-start;
    white-space:nowrap;
    padding:12px 16px 8px;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .pillbar::-webkit-scrollbar{display:none;}
  
  .pill{
    font-family:'Jost',sans-serif;
    font-size:13px; letter-spacing:0.02em;
    color:var(--teal-deep);
    background:rgba(241, 231, 209, 0.7);
    border:1px solid var(--line);
    padding:6px 14px;
    border-radius:999px;
    cursor:pointer;
    text-decoration:none;
    transition:background .2s, color .2s;
    display:inline-block;
    backdrop-filter: blur(4px);
  }
  .pill:hover{ background:var(--gold-soft); }

  /* ---------- Content ---------- */
  main{
    max-width:960px; margin:0 auto; padding:0 16px 80px;
  }
  section.category{ display:none; animation:fadeIn .35s ease; }
  section.category.show{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .group{ margin-top:30px; scroll-margin-top:110px; }
  .group-title{
    font-family:'Cormorant SC', serif;
    font-size:22px;
    letter-spacing:0.08em;
    color:var(--teal-deep);
    display:flex; align-items:center; gap:12px;
    margin-bottom:4px;
  }
  .group-title::after{
    content:""; flex:1; height:1px;
    background:linear-gradient(to right, var(--gold-soft), transparent);
  }

  .items{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:0 40px;
  }

  .item{
    padding:12px 0;
    border-bottom:1px dashed var(--line);
    display:flex; justify-content:space-between; gap:14px;
    align-items:flex-start;
  }
  .item-text{ flex:1; min-width:0; }
  .item-name{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:18px;
    color:var(--ink);
    line-height:1.25;
    word-wrap:break-word;
  }
  .item-desc{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:14px;
    color:var(--ink);
    opacity:0.75;
    margin-top:2px;
    line-height:1.3;
    word-wrap:break-word;
  }
  .item-price{
    font-family:'Jost',sans-serif;
    font-weight:600;
    font-size:16px;
    color:var(--teal);
    white-space:nowrap;
    text-align:right;
    padding-top:1px;
  }
  
  .price-pair{ text-align:right; white-space:nowrap; }
  .price-pair .row{ font-size:14px; font-weight:600; color:var(--teal); line-height:1.3; }
  .price-pair .row span.lbl{ font-weight:400; font-size:10px; color:var(--ink); opacity:0.5; margin-right:4px; letter-spacing:.05em; text-transform:uppercase;}

  mark{ background:var(--gold-soft); color:inherit; border-radius:3px; padding:0 2px; }

  .empty-state{
    text-align:center; padding:50px 16px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic; font-size:18px;
    color:var(--ink); opacity:0.55;
  }

  footer{
    text-align:center; padding:20px 16px 40px;
    font-family:'Cormorant SC', serif;
    letter-spacing:0.15em; font-size:11px;
    color:var(--teal-deep); opacity:0.5;
    line-height:1.4;
  }

  /* ---------- Tablet & Desktop adjustments ---------- */
  @media (min-width:681px){
    .tabs-inner{ justify-content:center; }
    .pillbar{ justify-content:center; }
    header{ padding:38px 24px 20px; }
    .wave{ height:34px; }
    .brand-logo-wrap { left: 24px; top: 38px; max-width: 80px; width: 100%; }
  }

  /* ---------- Mobile adjustments ---------- */
  @media (max-width:680px){ 
    .items{ grid-template-columns:1fr; } 
    .group-title { font-size:20px; }
    @media (max-width: 400px) {
      .brand-eyebrow { padding-left: 55px; text-align: right; }
    }
  }
</style>
</head>

        {n:"Shadrapa Rouge", p:80},
        {n:"Selian Rouge", p:60},
        {n:"Grand Patron Rouge", p:60},
        {n:"Vieux Magnifique Rouge", p:70},
        {n:"Phenicia Rouge", p:65},
        {n:"Kurubis Rouge", p:80},
        {n:"Magon Signature Rouge 3/4", p:65},
      ]},
    ]
  }
};

const tabbar = document.getElementById('tabbar');
const pillbar = document.getElementById('pillbar');
const main = document.getElementById('main');
const searchInput = document.getElementById('search');

let activeTab = Object.keys(DATA)[0];

function slug(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-'); }

function fmtPrice(item, tabKey){
  if(tabKey === 'bar' && DATA[tabKey] && item.dose !== undefined){
    return `<div class="price-pair">
      <div class="row"><span class="lbl">Dose</span>${item.dose} DT</div>
      ${item.bot ? `<div class="row"><span class="lbl">Bout.</span>${item.bot} DT</div>` : ''}
    </div>`;
  }
  if(item.note){ return `<div class="item-price">${item.note}</div>`; }
  return `<div class="item-price">${item.p !== null ? item.p + ' DT' : ''}</div>`;
}

function buildTabs(){
  Object.entries(DATA).forEach(([key, tab])=>{
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (key===activeTab ? ' active':'');
    btn.textContent = tab.label;
    btn.onclick = ()=>{ activeTab = key; searchInput.value=''; render(); };
    btn.dataset.key = key;
    tabbar.appendChild(btn);
  });
}

function buildPills(){
  pillbar.innerHTML = '';
  DATA[activeTab].groups.forEach(g=>{
    const a = document.createElement('a');
    a.className = 'pill';
    a.textContent = g.title;
    a.href = '#' + slug(g.title);
    pillbar.appendChild(a);
  });
}

function highlight(text, q){
  if(!q) return text;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx === -1) return text;
  return text.slice(0,idx) + '<mark>' + text.slice(idx, idx+q.length) + '</mark>' + text.slice(idx+q.length);
}

function render(){
  document.querySelectorAll('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.key===activeTab));
  buildPills();

  const q = searchInput.value.trim();
  main.innerHTML = '';

  let totalMatches = 0;

  Object.entries(DATA).forEach(([key, tab])=>{
    const section = document.createElement('section');
    section.className = 'category' + (key===activeTab && !q ? ' show' : (q ? ' show' : ''));
    if(!q) section.classList.toggle('show', key===activeTab);

    let sectionHasMatch = false;

    tab.groups.forEach(g=>{
      const matchedItems = q ? g.items.filter(it => (it.n+' '+(it.d||'')).toLowerCase().includes(q.toLowerCase())) : g.items;
      if(q && matchedItems.length===0) return;
      if(q && key!==activeTab && matchedItems.length===0) return;

      sectionHasMatch = true;
      totalMatches += matchedItems.length;

      const groupEl = document.createElement('div');
      groupEl.className = 'group';
      groupEl.id = slug(g.title);
      groupEl.innerHTML = `<div class="group-title">${g.title}</div>`;

      const itemsEl = document.createElement('div');
      itemsEl.className = 'items';

      matchedItems.forEach(it=>{
        const row = document.createElement('div');
        row.className = 'item';
        row.innerHTML = `
          <div class="item-text">
            <div class="item-name">${highlight(it.n,q)}</div>
            ${it.d ? `<div class="item-desc">${highlight(it.d,q)}</div>` : ''}
          </div>
          ${fmtPrice(it, key)}
        `;
        itemsEl.appendChild(row);
      });

      groupEl.appendChild(itemsEl);
      section.appendChild(groupEl);
    });

    if(q){
      section.classList.toggle('show', sectionHasMatch);
      if(sectionHasMatch){
        const label = document.createElement('div');
        label.className = 'group-title';
        label.style.marginTop = '46px';
        label.style.opacity = '0.5';
        label.textContent = tab.label;
        section.insertBefore(label, section.firstChild);
      }
    }

    main.appendChild(section);
  });

  if(q && totalMatches===0){
    main.innerHTML = `<div class="empty-state">Aucun résultat pour « ${q} ». Essayez un autre mot.</div>`;
  }
}

// ---------- Background Slideshow Logic ----------
function initSlideshow() {
  const slides = document.querySelectorAll('.bg-slide');
  let currentSlide = 0;

  setInterval(() => {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
  }, 3000); // 3 seconds interval[cite: 4]
}

searchInput.addEventListener('input', render);
buildTabs();
render();
initSlideshow();
</script>
</body>
</html>
